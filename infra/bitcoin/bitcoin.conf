# Ativa rede de testes local isolada (não interage com testnet/mainnet).
regtest=1
# Habilita modo servidor para aceitar chamadas JSON-RPC.
server=1
# Em cenários reais, manter P2P habilitado ajuda sincronização e resiliência.
listen=1
# Indexa transações para permitir consultas históricas mais amplas.
txindex=1

# Tudo que é específico da regtest (RPC, ZMQ, bind) fica na seção [regtest].
# Asso o Core aplica user/senha e allowip na rede certa (evita 401 “fantasma”).
[regtest]
# Interface de bind do RPC (0.0.0.0 = todas interfaces do container).
rpcbind=0.0.0.0
# CIDRs autorizados a chamar RPC (rede interna / Docker).
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16
# rpcuser / rpcpassword: definidos no docker-compose (args -rpcuser/-rpcpassword)
# a partir do .env, para ficar igual ao backend (evita 401 por conf fora de sync).
# Publisher ZMQ de hash de bloco.
zmqpubhashblock=tcp://0.0.0.0:28332
# Publisher ZMQ de hash de transação.
zmqpubhashtx=tcp://0.0.0.0:28333
